<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CantosTV Receiver</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0A1628; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
    cast-media-player {
      --background-color: #0A1628;
      --progress-color: #2B8FE8;
      --theme-hue: 210;
    }
    #idle-screen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #0A1628; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 5;
    }
    #idle-screen.hidden { display: none; }
    #idle-title { font-size: 48px; font-weight: 900; letter-spacing: 3px; margin-bottom: 8px; }
    #idle-title span.blue { color: #2B8FE8; }
    #idle-subtitle { font-size: 20px; color: #A8B5C7; }
    #error-msg { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(200,50,50,0.85); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 16px; display: none; z-index: 10; }
  </style>
</head>
<body>
  <div id="idle-screen">
    <svg width="120" height="120" viewBox="0 0 120 120" style="margin-bottom:24px">
      <rect width="120" height="120" rx="20" fill="#0A1628"/>
      <rect x="10" y="25" width="100" height="65" rx="8" fill="none" stroke="#2B8FE8" stroke-width="5"/>
      <rect x="45" y="90" width="30" height="8" rx="2" fill="#2B8FE8"/>
      <polygon points="48,45 48,75 78,60" fill="#2B8FE8"/>
    </svg>
    <div id="idle-title"><span class="blue">CANTOS</span>TV</div>
    <div id="idle-subtitle">Ready to cast</div>
  </div>

  <div id="error-msg"></div>

  <cast-media-player id="player"></cast-media-player>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    const idleScreen = document.getElementById('idle-screen');
    const errorMsg = document.getElementById('error-msg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      setTimeout(() => { errorMsg.style.display = 'none'; }, 8000);
    }

    // ── LOAD interceptor ──────────────────────────────────────────────────────
    // Key insight: Xtream .m3u8 streams contain MPEG-TS segments.
    // We must tell CAF the segment format is TS, otherwise it tries to parse
    // them as fMP4 and fails silently.
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (loadRequest) => {
        const media = loadRequest.media;
        const url = (media.contentUrl || media.contentId || '').toLowerCase();
        const mime = (media.contentType || '').toLowerCase();

        console.log('[CantosTV] LOAD url=' + url + ' mime=' + mime);

        const isHLS  = mime.includes('mpegurl') || url.includes('.m3u8');
        const isTS   = mime.includes('mp2t')    || url.endsWith('.ts');
        const isLive = url.includes('/live/')   || media.streamType === cast.framework.messages.StreamType.LIVE;

        if (isHLS || isTS) {
          // Always tell CAF the inner segment format is MPEG-TS
          // This is THE critical setting for Xtream/IPTV streams
          media.contentType = 'application/x-mpegurl';
          media.hlsSegmentFormat = cast.framework.messages.HlsSegmentFormat.TS;
          media.hlsVideoSegmentFormat = cast.framework.messages.HlsVideoSegmentFormat.MPEG2_TS;
          console.log('[CantosTV] Configured as HLS+TS, isLive=' + isLive);
        }

        if (isLive) {
          media.streamType = cast.framework.messages.StreamType.LIVE;
        }

        return loadRequest;
      }
    );

    // ── Player events ─────────────────────────────────────────────────────────
    playerManager.addEventListener(cast.framework.events.EventType.LOAD_START, () => {
      console.log('[CantosTV] LOAD_START');
      idleScreen.classList.add('hidden');
    });

    playerManager.addEventListener(cast.framework.events.EventType.PLAYING, () => {
      console.log('[CantosTV] PLAYING ✅');
      idleScreen.classList.add('hidden');
    });

    playerManager.addEventListener(cast.framework.events.EventType.BUFFERING, () => {
      console.log('[CantosTV] BUFFERING...');
    });

    playerManager.addEventListener(cast.framework.events.EventType.ENDED, () => {
      console.log('[CantosTV] ENDED');
      idleScreen.classList.remove('hidden');
    });

    playerManager.addEventListener(cast.framework.events.EventType.ERROR, (event) => {
      const code = event.detailedErrorCode;
      console.error('[CantosTV] ERROR code=' + code, JSON.stringify(event));
      showError('Playback error: ' + code);
      idleScreen.classList.remove('hidden');
    });

    playerManager.addEventListener(cast.framework.events.EventType.MEDIA_STATUS, (event) => {
      const s = event.mediaStatus;
      if (s) console.log('[CantosTV] STATUS playerState=' + s.playerState + ' idleReason=' + s.idleReason);
    });

    // ── Playback config ───────────────────────────────────────────────────────
    const playbackConfig = new cast.framework.PlaybackConfig();
    playbackConfig.segmentRequestRetryLimit  = 5;
    playbackConfig.manifestRequestRetryLimit = 5;
    playbackConfig.initialBandwidth = 2000000;

    // ── Start receiver ────────────────────────────────────────────────────────
    const options = new cast.framework.CastReceiverOptions();
    options.playbackConfig = playbackConfig;
    options.maxInactivity = 3600;

    context.start(options);
    console.log('[CantosTV] Receiver v2 started.');
  </script>
</body>
</html>
