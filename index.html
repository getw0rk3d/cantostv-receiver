<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CantosTV Receiver v5</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0A1628; overflow: hidden; font-family: Arial, sans-serif; color: #fff; }

    #video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      background: #000;
      display: none;
    }
    #video.visible { display: block; }

    #idle {
      position: fixed; inset: 0;
      background: #0A1628;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 5;
      transition: opacity 0.4s;
    }
    #idle.hidden { opacity: 0; pointer-events: none; }

    #brand { font-size: 52px; font-weight: 900; letter-spacing: 4px; margin: 20px 0 8px; }
    #brand span { color: #2B8FE8; }
    #tagline { font-size: 20px; color: #A8B5C7; }

    /* Only shown for FATAL unrecoverable errors — not transient ones */
    #error-msg {
      position: fixed; bottom: 40px; left: 40px; right: 40px;
      background: rgba(180,30,30,0.9);
      padding: 16px 24px; border-radius: 10px;
      font-size: 18px; text-align: center;
      display: none; z-index: 10;
    }
    #error-msg.visible { display: block; }

    #now-playing {
      position: fixed; top: 0; left: 0; right: 0;
      background: linear-gradient(rgba(0,0,0,0.7), transparent);
      padding: 20px 32px;
      display: none; z-index: 6;
    }
    #now-playing.visible { display: block; }
    #np-title { font-size: 28px; font-weight: bold; }
    #np-sub { font-size: 16px; color: #A8B5C7; margin-top: 4px; }
    .live-badge {
      display: inline-block; background: #e00; color: #fff;
      font-size: 13px; font-weight: bold; padding: 3px 10px;
      border-radius: 4px; margin-right: 8px; vertical-align: middle;
    }
  </style>
</head>
<body>
  <video id="video" playsinline></video>

  <div id="idle">
    <svg width="96" height="96" viewBox="0 0 120 120">
      <rect width="120" height="120" rx="20" fill="#0A1628"/>
      <rect x="8" y="22" width="104" height="68" rx="9" fill="none" stroke="#2B8FE8" stroke-width="6"/>
      <rect x="44" y="90" width="32" height="9" rx="3" fill="#2B8FE8"/>
      <polygon points="46,42 46,76 82,59" fill="#2B8FE8"/>
    </svg>
    <div id="brand"><span>CANTOS</span>TV</div>
    <div id="tagline">Ready to cast</div>
  </div>

  <div id="error-msg"></div>
  <div id="now-playing">
    <div id="np-title"></div>
    <div id="np-sub"></div>
  </div>

  <script>
  const videoEl  = document.getElementById('video');
  const idle     = document.getElementById('idle');
  const errorEl  = document.getElementById('error-msg');
  const npEl     = document.getElementById('now-playing');
  const npTitle  = document.getElementById('np-title');
  const npSub    = document.getElementById('np-sub');

  let hlsInstance = null;
  let npTimer = null;

  function log(msg) { console.log('[CantosTV v5]', msg); }

  // Only show errors for truly fatal, unrecoverable failures
  function showFatalError(msg) {
    log('FATAL: ' + msg);
    errorEl.textContent = '⚠ ' + msg;
    errorEl.className = 'visible';
    setTimeout(() => errorEl.className = '', 10000);
  }

  function showIdle()  { idle.classList.remove('hidden'); videoEl.classList.remove('visible'); npEl.className = ''; }
  function hideIdle()  { idle.classList.add('hidden'); videoEl.classList.add('visible'); }

  function showNowPlaying(title, isLive) {
    npTitle.innerHTML = (isLive ? '<span class="live-badge">LIVE</span>' : '') + title;
    npSub.textContent = isLive ? 'Live Stream' : 'On your TV';
    npEl.className = 'visible';
    clearTimeout(npTimer);
    npTimer = setTimeout(() => npEl.className = '', 5000);
  }

  function stopPlayback() {
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    videoEl.pause();
    videoEl.src = '';
    showIdle();
  }

  function isHLS(url, mime) {
    const u = (url || '').toLowerCase().split('?')[0];
    const m = (mime || '').toLowerCase();
    return m.includes('mpegurl') || u.endsWith('.m3u8') ||
           m.includes('mp2t')    || u.endsWith('.ts')   ||
           u.includes('/live/');
  }

  function playWithHLS(url, title, isLive) {
    log('HLS.js: ' + title);
    stopPlayback();
    hideIdle();

    hlsInstance = new Hls({
      liveSyncDurationCount: 3,
      liveMaxLatencyDurationCount: 10,
      enableWorker: true,
      lowLatencyMode: false,
      backBufferLength: 30,
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      manifestLoadingMaxRetry: 5,
      levelLoadingMaxRetry: 5,
      fragLoadingMaxRetry: 5,
      manifestLoadingRetryDelay: 1000,
    });

    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(videoEl);

    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      log('Manifest ready — playing');
      videoEl.play().catch(e => log('play() error: ' + e));
    });

    hlsInstance.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        log('HLS fatal: ' + data.type + ' / ' + data.details);
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          // Network errors: try to restart — common with IPTV, don't alarm user
          log('Network error — attempting restart...');
          hlsInstance.startLoad();
        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          // Media errors: try codec recovery — don't alarm user
          log('Media error — attempting recovery...');
          hlsInstance.recoverMediaError();
        } else {
          // Truly fatal — show error on screen
          showFatalError('Stream unavailable: ' + data.details);
          showIdle();
        }
      } else {
        // Non-fatal errors (very common in live IPTV) — log only, never show to user
        log('HLS non-fatal (ignored): ' + data.details);
      }
    });

    videoEl.onplaying = () => {
      log('Playing ✅');
      showNowPlaying(title, isLive);
    };
    videoEl.onended   = () => { log('Ended'); stopPlayback(); };
    videoEl.onerror   = () => {
      const c = { 1:'ABORTED', 2:'NETWORK', 3:'DECODE', 4:'UNSUPPORTED' };
      showFatalError(c[videoEl.error?.code] || 'Playback error');
      showIdle();
    };
  }

  function playNative(url, title) {
    log('Native: ' + title);
    stopPlayback();
    hideIdle();
    videoEl.src = url;
    videoEl.play().catch(e => { showFatalError(e.message); showIdle(); });
    videoEl.onplaying = () => { log('Playing ✅'); showNowPlaying(title, false); };
    videoEl.onerror   = () => { showFatalError('Failed to play'); showIdle(); };
  }

  // ── CAF ────────────────────────────────────────────────────────────────────
  const context       = cast.framework.CastReceiverContext.getInstance();
  const playerManager = context.getPlayerManager();

  playerManager.setMessageInterceptor(
    cast.framework.messages.MessageType.LOAD,
    (loadRequest) => {
      const media  = loadRequest.media;
      const url    = media.contentUrl || media.contentId || '';
      const mime   = media.contentType || '';
      const title  = media.metadata?.title || url.split('/').pop();
      const isLive = url.toLowerCase().includes('/live/') ||
                     media.streamType === cast.framework.messages.StreamType.LIVE;

      log('LOAD: ' + title);
      setTimeout(() => {
        isHLS(url, mime) ? playWithHLS(url, title, isLive) : playNative(url, title);
      }, 0);

      return loadRequest;
    }
  );

  playerManager.addEventListener(
    cast.framework.events.EventType.REQUEST_STOP,
    () => { stopPlayback(); log('Stopped'); }
  );

  const opts = new cast.framework.CastReceiverOptions();
  opts.maxInactivity = 3600;
  context.start(opts);
  log('Receiver v5 started');
  </script>
</body>
</html>
