<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CantosTV Receiver</title>

  <!-- Google Cast Receiver Framework v3 (CAF) -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <!-- HLS.js - needed for MPEG-TS / live IPTV streams -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0A1628;
      color: #FFFFFF;
      font-family: 'Roboto', Arial, sans-serif;
      overflow: hidden;
    }
    cast-media-player {
      --background-color: #0A1628;
      --logo-url: url('https://raw.githubusercontent.com/getw0rk3d/cantostv-receiver/main/logo.png');
      --splash-image: url('https://raw.githubusercontent.com/getw0rk3d/cantostv-receiver/main/splash.png');
      --theme-hue: 210;
      --progress-color: #2B8FE8;
    }
    /* Idle / splash screen */
    #idle-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0A1628;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }
    #idle-screen.hidden { display: none; }
    #idle-logo {
      width: 280px;
      height: 280px;
      margin-bottom: 24px;
    }
    #idle-title {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #FFFFFF;
      margin-bottom: 8px;
    }
    #idle-subtitle {
      font-size: 22px;
      color: #A8B5C7;
      letter-spacing: 1px;
    }
    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Idle splash screen shown when no media is casting -->
  <div id="idle-screen">
    <div id="idle-logo">
      <!-- Fallback SVG logo if no image file -->
      <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" rx="80" fill="#0A1628"/>
        <text x="50%" y="50%" text-anchor="middle" dy="0.35em"
              font-family="Arial, sans-serif" font-size="72" font-weight="900"
              fill="#2B8FE8" letter-spacing="4">CANTOS</text>
        <text x="50%" y="62%" text-anchor="middle" dy="0.35em"
              font-family="Arial, sans-serif" font-size="72" font-weight="900"
              fill="#FFFFFF" letter-spacing="4">TV</text>
        <circle cx="256" cy="380" r="32" fill="none" stroke="#FFFFFF" stroke-width="4"/>
        <polygon points="245,365 245,395 275,380" fill="#FFFFFF"/>
      </svg>
    </div>
    <div id="idle-title">CantosTV</div>
    <div id="idle-subtitle pulse">Ready to cast</div>
  </div>

  <!-- The actual media player element (CAF-managed) -->
  <cast-media-player id="player"></cast-media-player>

  <script>
    // ============================================================
    // CantosTV Custom Receiver
    // Supports: HLS (.m3u8), MPEG-TS (.ts), MP4, MKV
    // ============================================================

    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    const idleScreen = document.getElementById('idle-screen');

    // -------- Content type handling --------

    /**
     * Determine the stream type from URL + MIME to pick the right player.
     * Returns 'hls' | 'ts' | 'mp4' | 'other'
     */
    function detectStreamType(contentUrl, contentType) {
      const url = (contentUrl || '').toLowerCase().split('?')[0];
      const mime = (contentType || '').toLowerCase();

      if (mime.includes('mpegurl') || url.endsWith('.m3u8')) return 'hls';
      if (mime.includes('mp2t') || url.endsWith('.ts')) return 'ts';
      if (mime.includes('mp4') || url.endsWith('.mp4')) return 'mp4';
      if (mime.includes('matroska') || url.endsWith('.mkv')) return 'mkv';

      // Xtream /live/ URLs without extension - assume HLS-compatible stream
      if (url.includes('/live/')) return 'hls';
      return 'other';
    }

    // -------- Intercept LOAD requests to inject HLS.js for MPEG-TS --------

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (loadRequest) => {
        const mediaInfo = loadRequest.media;
        const url = mediaInfo.contentUrl || mediaInfo.contentId;
        const type = detectStreamType(url, mediaInfo.contentType);

        console.log('[CantosTV] LOAD request:', url, 'detected type:', type);

        // For pure HLS or MPEG-TS, we let HLS.js handle it via contentType override
        if (type === 'hls' || type === 'ts') {
          // Force CAF to treat it as HLS - hlsSegmentFormat tells CAF the inner format
          mediaInfo.contentType = 'application/x-mpegurl';
          mediaInfo.hlsSegmentFormat = cast.framework.messages.HlsSegmentFormat.TS;
          mediaInfo.hlsVideoSegmentFormat = cast.framework.messages.HlsVideoSegmentFormat.MPEG2_TS;

          // Mark as LIVE if this is a live stream (live MPEG-TS has no fixed duration)
          if (type === 'ts' || url.includes('/live/')) {
            mediaInfo.streamType = cast.framework.messages.StreamType.LIVE;
          }
        }

        return loadRequest;
      }
    );

    // -------- Event listeners for logging + splash control --------

    playerManager.addEventListener(
      cast.framework.events.EventType.LOAD_START,
      () => {
        console.log('[CantosTV] LOAD_START');
        idleScreen.classList.add('hidden');
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.PLAYING,
      () => {
        console.log('[CantosTV] PLAYING');
        idleScreen.classList.add('hidden');
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.ENDED,
      () => {
        console.log('[CantosTV] ENDED');
        idleScreen.classList.remove('hidden');
      }
    );

    playerManager.addEventListener(
      cast.framework.events.EventType.ERROR,
      (event) => {
        console.error('[CantosTV] PLAYBACK ERROR:', event.detailedErrorCode, event);
        idleScreen.classList.remove('hidden');
      }
    );

    // -------- Playback configuration --------

    const playbackConfig = new cast.framework.PlaybackConfig();
    // Bigger buffer helps live MPEG-TS streams that bounce bitrates
    playbackConfig.autoResumeDuration = 5;
    playbackConfig.autoResumeNumberOfSegments = 5;
    playbackConfig.autoPauseDuration = 10;
    playbackConfig.initialBandwidth = 1500000;
    // Allow more retries for shaky IPTV origins
    playbackConfig.segmentRequestRetryLimit = 5;
    playbackConfig.manifestRequestRetryLimit = 5;

    // -------- Receiver options --------

    const options = new cast.framework.CastReceiverOptions();
    options.playbackConfig = playbackConfig;
    // Keep the receiver alive longer when idle (prevents premature disconnects)
    options.maxInactivity = 3600; // 1 hour
    // Custom namespace so we can send custom messages from the sender app if needed later
    options.customNamespaces = {
      'urn:x-cast:com.cantostv.custom': cast.framework.system.MessageType.JSON,
    };

    // -------- Start the receiver --------

    context.start(options);
    console.log('[CantosTV] Receiver started and ready.');
  </script>
</body>
</html>
