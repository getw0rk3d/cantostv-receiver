<!DOCTYPE html>
<!--
  CantosTV Custom Cast Receiver
  =============================
  A Cast Application Framework (CAF) receiver that uses Shaka Player so we
  can actually switch audio tracks and subtitles inside MKV/MP4 files —
  something the default Cast Web Receiver cannot do.

  DEPLOYMENT STEPS (one-time):
  1. Pick a public HTTPS host. GitHub Pages is free and works:
       a. New repo "cantostv-cast-receiver"
       b. Push this file as index.html (and the receiver.js below)
       c. Enable Pages in repo Settings → Pages → Branch: main → /(root)
       d. Note the URL, e.g. https://<you>.github.io/cantostv-cast-receiver/
  2. Open Google Cast SDK Developer Console (https://cast.google.com/publish).
  3. Register the receiver URL → "Custom Receiver".
  4. Copy the App ID that's generated (looks like "ABCD1234").
  5. In CastOptionsProvider.kt swap `CastMediaControlIntent.DEFAULT_MEDIA_RECEIVER_APPLICATION_ID`
     for the new App ID and rebuild the app.
-->
<html>
  <head>
    <meta charset="utf-8" />
    <title>CantosTV Receiver</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <!-- Shaka removed: it doesn't support MKV and was making MKV casts silently fail to load. -->

    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #000; }
      #video { width: 100%; height: 100%; }
      #idle { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #2B8FE8; font: 600 36px system-ui; }
    </style>
  </head>
  <body>
    <cast-media-player id="player"></cast-media-player>
    <div id="idle">CantosTV — ready to cast</div>
    <script src="./receiver.js"></script>
  </body>
</html>
